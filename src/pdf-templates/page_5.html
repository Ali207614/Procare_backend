<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Procare - Kafolat Sertifikati</title>
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary-blue: #00a0e3;
        --text-dark: #222;
        --text-gray: #555;
        --border-color: #e1e1e1;
        --soft-blue: #eef9fe;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 0;
        background-color: #f5f5f5;
        font-family: 'Outfit', sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        color: var(--text-dark);
      }

      .page-container {
        width: 210mm;
        height: 297mm;
        background: #fff;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        padding: 16mm 18mm;
      }

      .page-bg-accent {
        position: absolute;
        right: -32mm;
        bottom: -30mm;
        width: 104mm;
        height: 104mm;
        opacity: 0.035;
        pointer-events: none;
        z-index: 0;
      }

      .document {
        position: relative;
        z-index: 1;
        height: 100%;
        display: flex;
        flex-direction: column;
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8mm;
        padding-bottom: 6mm;
        border-bottom: 0.4mm solid var(--primary-blue);
        position: relative;
      }

      .header::before {
        content: '';
        position: absolute;
        left: 50%;
        top: 0;
        bottom: 0;
        margin: auto;
        transform: translateX(-50%);
        width: 0.4mm;
        height: 11mm;
        background: #000;
        z-index: 1;
      }

      .brand-left {
        display: flex;
        align-items: center;
        gap: 5mm;
        min-width: 0;
      }

      .logo-img {
        width: auto;
        height: 14mm;
        flex: none;
      }

      .tagline {
        color: var(--text-dark);
        font-size: 18px;
        font-weight: 400;
        line-height: 18px;
        display: inline-flex;
        align-items: center;
        align-self: flex-end;
        margin-bottom: 6px;
        white-space: nowrap;
      }

      .content-grid {
        display: flex;
        flex-direction: column;
        gap: 7mm;
        flex: 1;
        padding-top: 7mm;
        min-height: 0;
      }

      /* Dynamic warranty content from database */
      .warranty-content {
        font-size: 11.5px;
        line-height: 1.5;
        color: var(--text-dark);
      }

      .warranty-content p {
        margin: 0 0 6px 0;
      }

      .warranty-content h2 {
        color: var(--primary-blue);
        font-size: 14px;
        font-weight: 700;
        line-height: 1.25;
        margin: 10px 0 7px 0;
      }

      .warranty-content h3 {
        color: var(--primary-blue);
        font-size: 13px;
        font-weight: 700;
        line-height: 1.25;
        margin: 8px 0 5px 0;
      }

      .warranty-content ul,
      .warranty-content ol {
        padding-left: 0;
        list-style: none;
        margin: 0;
      }

      .warranty-content ul li,
      .warranty-content ol li {
        margin-bottom: 5px;
        padding-left: 11px;
        position: relative;
      }

      .warranty-content ul li::before {
        content: '-';
        position: absolute;
        left: 0;
      }

      .warranty-content strong,
      .warranty-content b {
        font-weight: 700;
      }

      .info-panel {
        border: 0.3mm solid var(--border-color);
        padding: 6mm;
        width: 100%;
        background: rgba(255, 255, 255, 0.92);
      }

      .info-title {
        color: var(--primary-blue);
        font-size: 14px;
        font-weight: 800;
        line-height: 1.25;
        margin-bottom: 5mm;
        text-transform: uppercase;
      }

      .info-fields {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        column-gap: 8mm;
        row-gap: 3.5mm;
      }

      .field-row {
        display: flex;
        flex-direction: column;
        min-width: 0;
      }

      .field-row-wide {
        grid-column: 1 / -1;
      }

      .field-label {
        font-size: 10.5px;
        font-weight: 500;
        color: var(--text-gray);
        margin-bottom: 1mm;
      }

      .field-value {
        border-bottom: 0.25mm solid #cfcfcf;
        min-height: 5.5mm;
        font-weight: 600;
        font-size: 11.5px;
        line-height: 1.25;
        padding: 0 0 1.2mm 0;
        overflow-wrap: anywhere;
      }

      .signature-line {
        grid-column: 1 / -1;
        display: flex;
        flex-direction: column;
        min-width: 0;
        margin-top: 2mm;
      }

      .signature-line .field-label {
        font-size: 10.5px;
        font-weight: 500;
        color: var(--text-gray);
        margin-bottom: 1mm;
      }

      .signature-line .field-value {
        border-bottom: 0.25mm solid #cfcfcf;
        min-height: 7mm;
        font-weight: 600;
        font-size: 11.5px;
        line-height: 1.25;
        padding: 0 0 1.2mm 0;
        overflow-wrap: anywhere;
      }

      /* Warranty period multiline support */
      #field-warranty_period {
        white-space: pre-line;
        line-height: 1.45;
      }

      @media print {
        body {
          background: none;
        }

        .page-container {
          margin: 0;
          box-shadow: none;
          width: 210mm;
          height: 297mm;
        }

        @page {
          size: A4 portrait;
          margin: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="page-container" id="pageContainer">
      <img src="assets/half_logo.svg" class="page-bg-accent" alt="" />

      <main class="document">
        <header class="header">
          <div class="brand-left">
            <img src="assets/logo.png" class="logo-img" alt="Procare" />
          </div>
          <div class="tagline">Where experts Meet</div>
        </header>

        <section class="content-grid">
          <!-- Warranty content from active warranty document -->
          <div class="warranty-content" id="field-warranty_content"></div>

          <aside class="info-panel">
            <div class="info-title">Mijoz va qurilma ma'lumotlari</div>
            <div class="info-fields">
              <div class="field-row">
                <span class="field-label">F.I.SH:</span>
                <div class="field-value" id="field-customer_name"></div>
              </div>
              <div class="field-row">
                <span class="field-label">Telefon raqami:</span>
                <div class="field-value" id="field-phone_number"></div>
              </div>
              <div class="field-row">
                <span class="field-label">Qurilma nomi:</span>
                <div class="field-value" id="field-device_name"></div>
              </div>
              <div class="field-row">
                <span class="field-label">IMEI / Seriya raqami:</span>
                <div class="field-value" id="field-imei"></div>
              </div>
              <div class="signature-line">
                <span class="field-label">Procare vakili:</span>
                <div class="field-value" id="field-representative_name"></div>
              </div>
              <div class="field-row">
                <span class="field-label">Ta'mir sanasi:</span>
                <div class="field-value" id="field-date"></div>
              </div>
              <div class="field-row">
                <span class="field-label">Topshirish sanasi:</span>
                <div class="field-value" id="field-delivery_date"></div>
              </div>
              <div class="field-row field-row-wide">
                <span class="field-label">Kafolat muddati:</span>
                <div class="field-value" id="field-warranty_period"></div>
              </div>
            </div>
          </aside>
        </section>
      </main>
    </div>

    <script>
      window.renderApp = function (payload) {
        var form = (payload && payload.form) || {};

        var elements = document.querySelectorAll('[id^="field-"]');
        elements.forEach(function (el) {
          var key = el.id.replace('field-', '');

          // warranty_content uses innerHTML for sanitized HTML from DB
          if (key === 'warranty_content') {
            el.innerHTML = (payload && payload.warranty_content) || '';
            return;
          }

          // Format date fields from YYYY-MM-DD to DD.MM.YYYY
          if ((key === 'date' || key === 'delivery_date') && form[key]) {
            var parts = form[key].split('-');
            el.textContent = parts.length === 3 ? parts[2] + '.' + parts[1] + '.' + parts[0] : form[key];
          } else {
            el.textContent = form[key] || '';
          }
        });

        window.isRendered = true;
      };

      document.addEventListener('DOMContentLoaded', function () {
        if (typeof PAYLOAD !== 'undefined') {
          window.renderApp(PAYLOAD);
        } else {
          setTimeout(function () {
            if (!window.isRendered) window.renderApp({});
          }, 500);
        }
      });
    </script>
  </body>
</html>
